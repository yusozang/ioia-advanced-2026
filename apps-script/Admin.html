<!DOCTYPE html>
<!-- 2026 IOIA 심화과정 관리자 페이지 — Apps Script(HtmlService)로만 제공되는 비공개 페이지. google.script.run으로 서버 호출 -->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<base target="_top" />
<style>
  :root{ --primary:#800000; --secondary:#9fa0a0; --accent:#ffab40; --ink:#222; --soft:#faf6f6; --line:#e7dede; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--ink);background:var(--soft);line-height:1.5}
  .wrap{max-width:1100px;margin:0 auto;padding:0 18px}

  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#800000,#3a0000)}
  .gate .box{background:#fff;border-radius:14px;padding:34px 34px 28px;width:min(92vw,380px);text-align:center;box-shadow:0 14px 40px rgba(0,0,0,.3)}
  .gate h1{font-size:18px;color:var(--primary);margin-bottom:4px}
  .gate p{font-size:12.5px;color:#888;margin-bottom:20px}
  .gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-size:15px;text-align:center;margin-bottom:12px;outline:none}
  .gate input:focus{border-color:var(--primary)}
  .gate button{width:100%;padding:12px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  .gate button:hover{background:#6a0000}
  .gate .err{color:#c0392b;font-size:12.5px;margin-top:10px;min-height:16px}

  .app{display:none;padding:26px 0 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:22px}
  .topbar h1{font-size:20px;color:var(--primary)}
  .topbar .tools{display:flex;gap:8px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit}
  .btn:hover{border-color:var(--primary);color:var(--primary)}

  h2.sec{font-size:15px;color:var(--primary);margin:26px 0 10px}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}
  thead th{background:var(--primary);color:#fff;font-weight:600;font-size:12.5px}
  tbody tr:hover{background:#fcf8f8}
  td.num,th.num{text-align:center}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700}
  .pill.paid{background:#e7f5ec;color:#1e7e44}
  .pill.apply{background:#fff4e2;color:#b5740a}
  .pill.wait{background:#f0f0f0;color:#666}
  .full{color:#c0392b;font-weight:700}
  .mini{border:none;border-radius:6px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .mini.confirm{background:#1e7e44;color:#fff}
  .mini.confirm:hover{background:#166335}
  .mini.undo{background:#eee;color:#555}
  .mini.undo:hover{background:#e0e0e0}
  .mini.del{background:#fff;color:#b03030;border:1px solid #e7b3b3;margin-left:5px}
  .mini.del:hover{background:#fdecec}
  .filterbar{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
  .filterbar button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;font-size:12.5px;cursor:pointer;font-family:inherit}
  .filterbar button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .empty{color:#999;font-size:13px;padding:18px 4px}
  .note{color:#888;font-size:12px;margin-top:8px}
</style>
</head>
<body>

<div class="gate" id="gate">
  <form class="box" id="loginForm" autocomplete="off">
    <h1>IOIA 심화과정 관리자</h1>
    <p>관리자 비밀번호를 입력하세요.</p>
    <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password" />
    <button type="submit" id="loginBtn">로그인</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<div class="app" id="app">
  <div class="wrap">
    <div class="topbar">
      <h1>2026 IOIA 심화과정 · 접수 현황</h1>
      <div class="tools">
        <button class="btn" id="refreshBtn">새로고침</button>
        <button class="btn" id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <h2 class="sec">회차별 현황</h2>
    <table id="summaryTbl">
      <thead><tr>
        <th>회차</th><th class="num">정원</th><th class="num">입금확인</th>
        <th class="num">미입금(신청)</th><th class="num">대기</th><th class="num">잔여석</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    <p class="note">‘입금확인’ 수가 정원(20명)에 도달하면 잔여석이 0이 되고, 이후 신청자는 자동으로 대기자로 등록됩니다.</p>

    <h2 class="sec">참가자 리스트</h2>
    <div class="filterbar" id="filterbar"></div>
    <table id="listTbl">
      <thead><tr>
        <th>신청일시</th><th>성명</th><th>소속</th><th>이메일</th><th>연락처</th>
        <th>회차</th><th>상태</th><th>처리</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    <div class="empty" id="listEmpty" style="display:none">신청자가 없습니다.</div>
  </div>
</div>

<script>
let PW = "";
let DATA = { summary: [], list: [] };
let FILTER = "전체";

// google.script.run 을 Promise 로 감싸 호출
function run(fn, args) {
  args = args || [];
  return new Promise(function (resolve, reject) {
    var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    runner[fn].apply(runner, args);
  });
}

document.getElementById("loginForm").addEventListener("submit", function (e) {
  e.preventDefault();
  var errEl = document.getElementById("loginErr");
  var btn = document.getElementById("loginBtn");
  PW = document.getElementById("pw").value;
  if (!PW) { errEl.textContent = "비밀번호를 입력하세요."; return; }
  btn.disabled = true; btn.textContent = "확인 중…"; errEl.textContent = "";
  run("adminList", [PW]).then(function (j) {
    if (j && j.ok) { enterApp(j); }
    else if (j && j.error === "auth") { errEl.textContent = "비밀번호가 올바르지 않습니다."; }
    else { errEl.textContent = "오류: " + ((j && j.error) || "알 수 없음"); }
  }).catch(function () {
    errEl.textContent = "서버에 연결할 수 없습니다.";
  }).then(function () {
    btn.disabled = false; btn.textContent = "로그인";
  });
});

function enterApp(j) {
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display = "block";
  render(j);
}

function reload() {
  run("adminList", [PW]).then(function (j) {
    if (j && j.ok) render(j);
    else if (j && j.error === "auth") logout();
  });
}

function render(j) {
  DATA = j;
  var sb = document.querySelector("#summaryTbl tbody");
  sb.innerHTML = "";
  j.summary.forEach(function (s) {
    var tr = document.createElement("tr");
    var remain = s.잔여 === 0 ? '<span class="full">0 (마감)</span>' : s.잔여;
    tr.innerHTML = "<td>" + s.회차 + "</td><td class='num'>" + s.정원 + "</td><td class='num'>"
      + s.입금확인 + "</td><td class='num'>" + s.미입금 + "</td><td class='num'>" + s.대기
      + "</td><td class='num'>" + remain + "</td>";
    sb.appendChild(tr);
  });
  var fb = document.getElementById("filterbar");
  var sessions = ["전체"].concat(j.summary.map(function (s) { return s.회차; }));
  fb.innerHTML = "";
  sessions.forEach(function (name) {
    var b = document.createElement("button");
    b.textContent = name;
    if (name === FILTER) b.className = "on";
    b.addEventListener("click", function () { FILTER = name; render(DATA); });
    fb.appendChild(b);
  });
  renderList();
}

function renderList() {
  var tb = document.querySelector("#listTbl tbody");
  var empty = document.getElementById("listEmpty");
  tb.innerHTML = "";
  var rows = DATA.list.filter(function (x) { return FILTER === "전체" || x.신청회차 === FILTER; });
  if (rows.length === 0) { empty.style.display = "block"; return; }
  empty.style.display = "none";
  rows.forEach(function (x) {
    var tr = document.createElement("tr");
    var pill, action;
    if (x.상태 === "입금확인") {
      pill = '<span class="pill paid">입금확인</span>';
      action = '<button class="mini undo" data-act="undo" data-row="' + x.row + '">확인취소</button>';
    } else if (x.상태 === "대기") {
      pill = '<span class="pill wait">대기</span>';
      action = '<button class="mini confirm" data-act="confirm" data-row="' + x.row + '">입금확인</button>';
    } else {
      pill = '<span class="pill apply">미입금</span>';
      action = '<button class="mini confirm" data-act="confirm" data-row="' + x.row + '">입금확인</button>';
    }
    action += '<button class="mini del" data-act="delete" data-id="' + esc(x.id) + '" data-name="' + esc(x.성명) + '">삭제</button>';
    tr.innerHTML = "<td>" + x.신청일시 + "</td><td>" + esc(x.성명) + "</td><td>" + esc(x.소속)
      + "</td><td>" + esc(x.이메일) + "</td><td>" + esc(x.연락처) + "</td><td>" + x.신청회차
      + "</td><td>" + pill + "</td><td>" + action + "</td>";
    tb.appendChild(tr);
  });
}

// 입금확인/확인취소 — 이벤트 위임
document.querySelector("#listTbl tbody").addEventListener("click", function (e) {
  var btn = e.target.closest("button[data-act]");
  if (!btn) return;
  var act = btn.getAttribute("data-act");
  if (act === "delete") { confirmDelete(btn.getAttribute("data-id"), btn.getAttribute("data-name")); return; }
  var row = parseInt(btn.getAttribute("data-row"), 10);
  if (act === "confirm") confirmPay(row);
  else unconfirm(row);
});

function confirmDelete(id, name) {
  if (!confirm("'" + name + "' 신청건을 완전히 삭제합니다.\n삭제하면 되돌릴 수 없습니다. 계속할까요?")) return;
  run("adminDelete", [PW, id]).then(function (j) {
    if (j && j.ok) reload(); else alert("삭제 실패: " + ((j && j.error) || ""));
  });
}

function confirmPay(row) {
  if (!confirm("입금 확인 처리하고 신청자에게 '접수 완료' 메일을 보냅니다. 계속할까요?")) return;
  run("adminConfirm", [PW, row]).then(function (j) {
    if (j && j.ok) reload(); else alert("처리 실패: " + ((j && j.error) || ""));
  });
}

function unconfirm(row) {
  if (!confirm("입금 확인을 취소하고 '미입금' 상태로 되돌립니다. (메일은 발송되지 않습니다)")) return;
  run("adminUnconfirm", [PW, row]).then(function (j) {
    if (j && j.ok) reload(); else alert("처리 실패: " + ((j && j.error) || ""));
  });
}

function logout() { location.reload(); }

function esc(s) {
  return (s == null ? "" : String(s)).replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
  });
}

document.getElementById("refreshBtn").addEventListener("click", reload);
document.getElementById("logoutBtn").addEventListener("click", logout);
</script>
</body>
</html>
